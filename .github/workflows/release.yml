name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (Linux)
        if: matrix.platform == 'linux'
        run: sudo apt-get install -y libarchive-tools

      - name: Install npm dependencies
        run: npm ci

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron-build -- --publish always

  notes:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Set version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Write release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --notes \
"## Download

| Platform | File |
|---|---|
| 🍎 macOS | \`Convertr-${{ steps.ver.outputs.version }}-mac.dmg\` |
| 🪟 Windows | \`Convertr-${{ steps.ver.outputs.version }}-windows.exe\` |
| 🐧 Linux | \`Convertr-${{ steps.ver.outputs.version }}-linux.AppImage\` |

> **macOS note:** If you see a security warning on first launch, go to System Settings → Privacy & Security → Open Anyway."
